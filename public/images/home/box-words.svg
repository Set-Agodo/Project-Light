<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF8E1"/>
    </linearGradient>
    <linearGradient id="bookCover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="bookSpine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <filter id="bshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="8" stdDeviation="6" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="wshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <rect width="400" height="260" fill="url(#wbg)" rx="16"/>
  <!-- Warm glow -->
  <ellipse cx="200" cy="130" rx="160" ry="100" fill="#FFE082" opacity="0.2"/>

  <!-- ===== Open Book ===== -->
  <g transform="translate(90, 55)" filter="url(#bshadow)">
    <!-- Book shadow -->
    <ellipse cx="110" cy="188" rx="105" ry="12" fill="rgba(0,0,0,0.2)"/>

    <!-- Left page -->
    <path d="M8 20 Q8 8 20 8 L108 8 L108 175 Q60 168 8 175 Z" fill="url(#page)" stroke="#FFE082" stroke-width="1"/>
    <!-- Left page lines -->
    <g stroke="#FFE082" stroke-width="1.5" opacity="0.7">
      <line x1="22" y1="38" x2="98" y2="38"/>
      <line x1="22" y1="56" x2="98" y2="56"/>
      <line x1="22" y1="74" x2="98" y2="74"/>
      <line x1="22" y1="92" x2="98" y2="92"/>
      <line x1="22" y1="110" x2="98" y2="110"/>
      <line x1="22" y1="128" x2="98" y2="128"/>
      <line x1="22" y1="146" x2="98" y2="146"/>
    </g>
    <!-- Left page: words flying off -->
    <text x="30" y="38" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#F57F17">the</text>
    <text x="55" y="56" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#1565C0">and</text>
    <text x="28" y="74" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#2E7D32">is</text>
    <text x="60" y="92" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#6A1B9A">he</text>
    <text x="30" y="110" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#AD1457">in</text>
    <text x="50" y="128" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#E65100">on</text>
    <text x="28" y="146" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#00695C">at</text>

    <!-- Book spine -->
    <rect x="104" y="8" width="12" height="167" fill="url(#bookSpine)"/>

    <!-- Right page -->
    <path d="M116 8 L204 8 Q216 8 216 20 L216 175 Q164 168 116 175 Z" fill="url(#page)" stroke="#FFE082" stroke-width="1"/>
    <!-- Right page lines -->
    <g stroke="#FFE082" stroke-width="1.5" opacity="0.7">
      <line x1="124" y1="38" x2="208" y2="38"/>
      <line x1="124" y1="56" x2="208" y2="56"/>
      <line x1="124" y1="74" x2="208" y2="74"/>
      <line x1="124" y1="92" x2="208" y2="92"/>
      <line x1="124" y1="110" x2="208" y2="110"/>
      <line x1="124" y1="128" x2="208" y2="128"/>
      <line x1="124" y1="146" x2="208" y2="146"/>
    </g>
    <text x="130" y="38" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#C62828">you</text>
    <text x="158" y="56" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#2E7D32">it</text>
    <text x="134" y="74" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#1565C0">she</text>
    <text x="160" y="92" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#6A1B9A">was</text>
    <text x="130" y="110" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#E65100">we</text>
    <text x="160" y="128" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#AD1457">my</text>
    <text x="132" y="146" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#00695C">to</text>

    <!-- Book cover bottom -->
    <path d="M8 175 Q60 168 108 175 L108 182 Q60 176 8 182 Z" fill="#BF360C"/>
    <path d="M116 175 Q164 168 216 175 L216 182 Q164 176 116 182 Z" fill="#BF360C"/>
  </g>

  <!-- Floating word pills above book -->
  <g filter="url(#wshadow)">
    <rect x="30" y="25" width="52" height="22" rx="11" fill="#FF7043"/>
    <text x="56" y="41" font-family="Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle" fill="white">said</text>

    <rect x="314" y="30" width="52" height="22" rx="11" fill="#42A5F5"/>
    <text x="340" y="46" font-family="Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle" fill="white">have</text>

    <rect x="24" y="190" width="52" height="22" rx="11" fill="#66BB6A"/>
    <text x="50" y="206" font-family="Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle" fill="white">like</text>

    <rect x="320" y="195" width="52" height="22" rx="11" fill="#AB47BC"/>
    <text x="346" y="211" font-family="Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle" fill="white">this</text>
  </g>

  <text x="200" y="248" font-family="Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#E65100" opacity="0.8">50 Most Common Words</text>
</svg>
